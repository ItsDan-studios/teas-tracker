<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TEAS Study Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=Playfair+Display:wght@700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --ink: #2c1810;
    --parchment: #faf7f2;
    --warm: #f5ede0;
    --amber: #c8860a;
    --amber-light: #f0c060;
    --reading: #2a5c8a;
    --english: #6b3a7d;
    --review: #3a7a4a;
    --muted: #8a7060;
    --border: #e0d0c0;
  }
  body {
    font-family: 'Crimson Text', Georgia, serif;
    background: var(--parchment);
    color: var(--ink);
    min-height: 100vh;
  }

  /* ── HEADER ── */
  .site-header {
    background: linear-gradient(135deg, #2c1810 0%, #4a2e1a 100%);
    padding: 52px 24px 44px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .site-header::before {
    content: '';
    position: absolute; inset: 0;
    opacity: .05;
    background-image: repeating-linear-gradient(45deg,#fff 0,#fff 1px,transparent 0,transparent 50%);
    background-size: 12px 12px;
  }
  .header-inner { position: relative; }
  .header-eyebrow {
    font-family: 'DM Mono', monospace;
    font-size: 11px; letter-spacing: 4px;
    color: #c8a060; text-transform: uppercase;
    margin-bottom: 12px;
  }
  .header-title {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: clamp(34px, 7vw, 56px);
    font-weight: 900; color: #faf7f2;
    line-height: 1.05; margin-bottom: 8px;
  }
  .header-sub {
    font-size: 19px; font-style: italic;
    color: #c8a060; margin-bottom: 36px;
  }

  /* ── PROGRESS CARD ── */
  .progress-card {
    max-width: 480px; margin: 0 auto;
    background: rgba(255,255,255,.07);
    border-radius: 16px; padding: 20px 24px;
  }
  .progress-meta {
    display: flex; justify-content: space-between; align-items: baseline;
    margin-bottom: 10px;
  }
  .progress-label {
    font-family: 'DM Mono', monospace;
    font-size: 12px; color: #c8a060; letter-spacing: 1px;
  }
  .progress-pct {
    font-family: 'Playfair Display', serif;
    font-size: 30px; font-weight: 700; color: #f0c060;
  }
  .progress-bar-track {
    background: rgba(255,255,255,.15);
    border-radius: 100px; height: 8px; overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--amber), var(--amber-light));
    border-radius: 100px;
    transition: width .6s ease;
  }
  .progress-foot {
    display: flex; justify-content: space-between;
    margin-top: 8px;
  }
  .progress-foot span {
    font-family: 'DM Mono', monospace;
    font-size: 11px; color: rgba(200,160,96,.7);
  }

  /* ── BODY ── */
  .body-wrap {
    max-width: 780px; margin: 0 auto;
    padding: 40px 20px 80px;
  }

  /* ── LEGEND ── */
  .legend {
    display: flex; flex-wrap: wrap; gap: 20px;
    justify-content: center; margin-bottom: 32px;
  }
  .legend-item {
    display: flex; align-items: center; gap: 7px;
    font-family: 'DM Mono', monospace;
    font-size: 12px; color: var(--muted);
  }
  .legend-dot {
    width: 10px; height: 10px; border-radius: 50%;
  }
  .legend-box {
    width: 10px; height: 10px; border-radius: 3px;
    border: 2px solid var(--amber);
  }

  /* ── WEEK SECTION ── */
  .week-section { margin-bottom: 36px; }
  .week-divider {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 18px;
  }
  .week-divider-line { flex: 1; height: 1px; background: var(--border); }
  .week-divider-label {
    font-family: 'Playfair Display', serif;
    font-size: 15px; font-weight: 700;
    color: var(--amber); white-space: nowrap;
  }

  /* ── DAY CARD ── */
  .day-card {
    background: white;
    border-radius: 12px;
    border: 1px solid var(--border);
    overflow: hidden;
    margin-bottom: 12px;
    transition: box-shadow .2s;
  }
  .day-card.is-today {
    border-color: var(--amber);
    box-shadow: 0 0 0 2px rgba(200,134,10,.18), 0 4px 20px rgba(200,134,10,.12);
  }
  .day-card.is-past { opacity: .78; }

  .day-head {
    padding: 12px 16px;
    background: var(--warm);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center;
    justify-content: space-between;
    flex-wrap: wrap; gap: 8px;
  }
  .day-head.review-head { background: #f0f7f1; }
  .day-head.final-head  { background: #fdf5e0; }

  .day-head-left { display: flex; align-items: center; gap: 10px; }
  .day-num-badge {
    font-family: 'DM Mono', monospace;
    font-size: 11px; font-weight: 500;
    background: #2c1810; color: white;
    padding: 2px 9px; border-radius: 100px;
  }
  .day-num-badge.review-badge { background: var(--review); }
  .day-num-badge.final-badge  { background: var(--amber); }
  .day-date-str {
    font-size: 15px; font-style: italic; color: var(--muted);
  }
  .today-chip, .final-chip {
    font-family: 'DM Mono', monospace;
    font-size: 10px; letter-spacing: 1px;
    background: var(--amber); color: white;
    padding: 2px 9px; border-radius: 100px;
  }

  /* ── TOPIC ROWS ── */
  .day-body { padding: 14px 16px; }
  .topic-row {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 5px 0;
  }
  .topic-divider { height: 1px; background: var(--border); margin: 5px 0; }

  .check-btn {
    width: 22px; height: 22px; border-radius: 50%;
    border: 2px solid; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; background: transparent;
    font-size: 12px; transition: transform .15s;
    outline: none;
  }
  .check-btn:hover { transform: scale(1.15); }
  .check-btn.reading  { border-color: var(--reading); }
  .check-btn.english  { border-color: var(--english); }
  .check-btn.review-c { border-color: var(--review);  }
  .check-btn.done.reading  { color: var(--reading); background: #e6f0f8; }
  .check-btn.done.english  { color: var(--english); background: #f3eaf7; }
  .check-btn.done.review-c { color: var(--review);  background: #e8f5ec; }
  .check-btn:not(.done) { color: transparent; }

  .topic-right { flex: 1; }
  .topic-top { display: flex; align-items: flex-start; gap: 8px; flex-wrap: wrap; }
  .badge {
    display: inline-block;
    padding: 2px 10px; border-radius: 100px;
    font-family: 'DM Mono', monospace;
    font-size: 11px; font-weight: 500;
    flex-shrink: 0; margin-top: 1px;
  }
  .badge.reading { background: #e6f0f8; color: var(--reading); border: 1px solid #b0cce0; }
  .badge.english { background: #f3eaf7; color: var(--english); border: 1px solid #d0b0e0; }
  .badge.review  { background: #e8f5ec; color: var(--review);  border: 1px solid #b8e0c0; }

  .topic-text {
    font-size: 16px; line-height: 1.35; flex: 1;
  }
  .topic-text.done { text-decoration: line-through; color: var(--muted); }

  .note-btn {
    background: none;
    border: 1px solid var(--border); border-radius: 4px;
    padding: 2px 8px;
    font-family: 'DM Mono', monospace; font-size: 11px;
    color: var(--muted); cursor: pointer;
    transition: border-color .15s, color .15s;
    margin-top: 5px;
  }
  .note-btn:hover { border-color: var(--amber); color: var(--amber); }

  .note-display {
    font-family: 'DM Mono', monospace; font-size: 11px;
    color: var(--muted); font-style: italic;
    background: var(--warm); border-radius: 4px;
    padding: 5px 9px; margin-top: 5px;
    border-left: 2px solid var(--amber-light);
  }

  .note-editor { margin-top: 10px; padding-left: 32px; }
  .note-editor textarea {
    width: 100%; border: 1px solid var(--border);
    border-radius: 6px; padding: 8px;
    font-family: 'Crimson Text', serif; font-size: 15px;
    color: var(--ink); background: var(--warm);
    resize: vertical; min-height: 70px; outline: none;
  }
  .note-editor textarea:focus { border-color: var(--amber); }
  .note-actions { display: flex; gap: 8px; margin-top: 6px; }
  .btn-save {
    background: var(--amber); color: white;
    border: none; border-radius: 6px;
    padding: 5px 16px;
    font-family: 'DM Mono', monospace; font-size: 12px;
    cursor: pointer; transition: background .15s;
  }
  .btn-save:hover { background: #a87008; }
  .btn-cancel {
    background: none; border: 1px solid var(--border);
    border-radius: 6px; padding: 5px 12px;
    font-family: 'DM Mono', monospace; font-size: 12px;
    color: var(--muted); cursor: pointer;
  }

  /* ── FOOTER ── */
  .site-footer {
    text-align: center; margin-top: 48px;
    padding-top: 32px; border-top: 1px solid var(--border);
  }
  .footer-ornament { font-size: 22px; color: var(--amber-light); opacity: .7; margin-bottom: 8px; }
  .footer-text { font-size: 16px; font-style: italic; color: var(--muted); line-height: 1.6; }

  /* ── ANIMATIONS ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .week-section { animation: fadeUp .4s ease both; }
  .week-section:nth-child(1) { animation-delay: .05s; }
  .week-section:nth-child(2) { animation-delay: .12s; }
  .week-section:nth-child(3) { animation-delay: .19s; }
  .week-section:nth-child(4) { animation-delay: .26s; }
</style>
</head>
<body>

<!-- ══════════ HEADER ══════════ -->
<header class="site-header">
  <div class="header-inner">
    <div class="header-eyebrow">TEAS Exam Prep · Learning Phase</div>
    <h1 class="header-title">Study Progress</h1>
    <p class="header-sub">March 8 – 29, 2026 · Reading &amp; English</p>

    <div class="progress-card">
      <div class="progress-meta">
        <span class="progress-label">OVERALL PROGRESS</span>
        <span class="progress-pct" id="pct-display">0%</span>
      </div>
      <div class="progress-bar-track">
        <div class="progress-bar-fill" id="progress-fill" style="width:0%"></div>
      </div>
      <div class="progress-foot">
        <span id="count-display">0 of 45 topics complete</span>
        <span id="day-display"></span>
      </div>
    </div>
  </div>
</header>

<!-- ══════════ BODY ══════════ -->
<main class="body-wrap">

  <!-- Legend -->
  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:#2a5c8a"></div>Reading</div>
    <div class="legend-item"><div class="legend-dot" style="background:#6b3a7d"></div>English</div>
    <div class="legend-item"><div class="legend-dot" style="background:#3a7a4a"></div>Review Day</div>
    <div class="legend-item"><div class="legend-box"></div>Today</div>
  </div>

  <!-- Schedule injected by JS -->
  <div id="schedule-root"></div>

  <footer class="site-footer">
    <div class="footer-ornament">✦</div>
    <p class="footer-text">All topics introduced by March 29, 2026.<br>You've got this.</p>
  </footer>
</main>

<script>
// ── DATA ──────────────────────────────────────────────────────────────────────
const SCHEDULE = [
  {
    weekLabel: "Week 1 · March 8–14",
    days: [
      { day:1,  date:"Sunday, March 8",     r:"Topic and Main Ideas",                               e:"Nouns" },
      { day:2,  date:"Monday, March 9",     r:"Supporting Details and Key Points",                  e:"Pronouns" },
      { day:3,  date:"Tuesday, March 10",   r:"Inferences vs Conclusions",                          e:"Verbs and Verb Tenses" },
      { day:4,  date:"Wednesday, March 11", r:"Meaning of Words and Context Clues",                 e:"Adjectives and Adverbs" },
      { day:5,  date:"Thursday, March 12",  r:"Author's Purpose and Point of View",                 e:"Prepositions, Conjunctions, Interjections" },
      { day:6,  date:"Friday, March 13",    r:"Locate Specific Information",                        e:"Subject, Predicate, Modifiers, Complements" },
      { day:7,  date:"Saturday, March 14",  review:"Review all topics from Days 1–6" },
    ]
  },
  {
    weekLabel: "Week 2 · March 15–21",
    days: [
      { day:8,  date:"Sunday, March 15",    r:"Interpret Events in a Sequence",                     e:"Direct Objects and Indirect Objects" },
      { day:9,  date:"Monday, March 16",    r:"Facts vs Opinions, Misconceptions vs Stereotypes",   e:"Complete, Incomplete, and Imperative Sentences" },
      { day:10, date:"Tuesday, March 17",   r:"Making Predictions and Evaluating an Argument",      e:"Transition Words" },
      { day:11, date:"Wednesday, March 18", r:"Comparing and Contrasting Themes",                   e:"Diction and Run-On Sentences" },
      { day:12, date:"Thursday, March 19",  r:"Primary Sources",                                    e:"Capitalization" },
      { day:13, date:"Friday, March 20",    r:"Rhetorical Devices",                                 e:"Punctuation" },
      { day:14, date:"Saturday, March 21",  review:"Review all topics from Days 8–13" },
    ]
  },
  {
    weekLabel: "Week 3 · March 22–28",
    days: [
      { day:15, date:"Sunday, March 22",    r:"Analyzing Data Sources",                             e:"Spelling" },
      { day:16, date:"Monday, March 23",    r:"Integrating Data",                                   e:"Root Words, Prefixes, Suffixes" },
      { day:17, date:"Tuesday, March 24",   r:"Comprehending Written Directions",                   e:"Correct Sentence Structure" },
      { day:18, date:"Wednesday, March 25", r:"Meaning of Words / Context Clues Review",            e:"Evaluating if Language Meets the Needs of an Audience" },
      { day:19, date:"Thursday, March 26",  r:"Author's Purpose Review",                            e:"Formal and Informal Language" },
      { day:20, date:"Friday, March 27",    r:"Inference and Argument Review",                      e:"Develop an Organized Paragraph" },
      { day:21, date:"Saturday, March 28",  review:"Review all topics from Days 15–20" },
    ]
  },
  {
    weekLabel: "Final Day · March 29",
    days: [
      { day:22, date:"Sunday, March 29",    r:"Data Interpretation Review",                         e:"Basic Writing Process", final:true },
    ]
  }
];

// ── STORAGE ───────────────────────────────────────────────────────────────────
const STORE_KEY_C = "teas-completed";
const STORE_KEY_N = "teas-notes";

function loadCompleted() {
  try { return JSON.parse(localStorage.getItem(STORE_KEY_C) || "{}"); } catch { return {}; }
}
function loadNotes() {
  try { return JSON.parse(localStorage.getItem(STORE_KEY_N) || "{}"); } catch { return {}; }
}
function saveCompleted(obj) {
  localStorage.setItem(STORE_KEY_C, JSON.stringify(obj));
}
function saveNotes(obj) {
  localStorage.setItem(STORE_KEY_N, JSON.stringify(obj));
}

let completed = loadCompleted();
let notes     = loadNotes();

// ── TODAY ─────────────────────────────────────────────────────────────────────
function getTodayDay() {
  const start = new Date("2026-03-08T00:00:00");
  const now   = new Date(); now.setHours(0,0,0,0);
  return Math.floor((now - start) / 86400000) + 1;
}
const todayDay = getTodayDay();

// total checkable items: 22 study days × 2 + 3 review days = 47
// actually: 19 study days × 2 topics + 3 review days = 41; let's compute from data
let TOTAL = 0;
SCHEDULE.forEach(w => w.days.forEach(d => {
  if (d.review) TOTAL += 1;
  else TOTAL += 2;
}));

// ── UPDATE PROGRESS BAR ───────────────────────────────────────────────────────
function refreshProgress() {
  const done = Object.values(completed).filter(Boolean).length;
  const pct  = Math.round((done / TOTAL) * 100);
  document.getElementById("pct-display").textContent   = pct + "%";
  document.getElementById("progress-fill").style.width = pct + "%";
  document.getElementById("count-display").textContent = `${done} of ${TOTAL} topics complete`;
  const dl = document.getElementById("day-display");
  if (todayDay >= 1 && todayDay <= 22) dl.textContent = `Day ${todayDay} of 22`;
  else if (todayDay > 22)               dl.textContent = "Schedule Complete!";
  else                                  dl.textContent = "Starts Mar 8";
}

// ── NOTE EDITOR ───────────────────────────────────────────────────────────────
let openEditor = null; // key of currently open editor

function openNoteEditor(key) {
  // close any other open editor first
  if (openEditor && openEditor !== key) closeNoteEditor(openEditor);
  openEditor = key;

  const editorEl = document.getElementById("editor-" + key);
  const ta       = editorEl.querySelector("textarea");
  ta.value       = notes[key] || "";
  editorEl.style.display = "block";
  ta.focus();
}
function closeNoteEditor(key) {
  const editorEl = document.getElementById("editor-" + key);
  if (editorEl) editorEl.style.display = "none";
  if (openEditor === key) openEditor = null;
}
function saveNote(key) {
  const ta = document.getElementById("editor-" + key).querySelector("textarea");
  notes[key] = ta.value.trim();
  saveNotes(notes);
  // update display
  const nd = document.getElementById("note-display-" + key);
  const nb = document.getElementById("note-btn-" + key);
  if (notes[key]) {
    nd.textContent     = notes[key];
    nd.style.display   = "block";
    nb.textContent     = "✎ edit note";
  } else {
    nd.style.display   = "none";
    nb.textContent     = "+ add note";
  }
  closeNoteEditor(key);
}
function toggleCheck(key, type) {
  completed[key] = !completed[key];
  saveCompleted(completed);

  const btn  = document.getElementById("check-" + key);
  const text = document.getElementById("text-" + key);

  if (completed[key]) {
    btn.classList.add("done");
    btn.textContent = "✓";
    if (text) text.classList.add("done");
  } else {
    btn.classList.remove("done");
    btn.textContent = "";
    if (text) text.classList.remove("done");
  }
  refreshProgress();
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function renderTopicRow(key, type, label) {
  const isDone    = !!completed[key];
  const noteText  = notes[key] || "";
  const badgeClass = type; // "reading" | "english" | "review"
  const badgeLabel = type === "reading" ? "Reading" : type === "english" ? "English" : "Review Day";

  return `
    <div class="topic-row">
      <button
        id="check-${key}"
        class="check-btn ${type}${isDone ? " done" : ""}"
        onclick="toggleCheck('${key}','${type}')"
        aria-label="Mark complete"
      >${isDone ? "✓" : ""}</button>
      <div class="topic-right">
        <div class="topic-top">
          <span class="badge ${type}">${badgeLabel}</span>
          <span id="text-${key}" class="topic-text${isDone ? " done" : ""}">${label}</span>
        </div>
        <div
          id="note-display-${key}"
          class="note-display"
          style="display:${noteText ? "block" : "none"}"
        >${noteText}</div>
        <button
          id="note-btn-${key}"
          class="note-btn"
          onclick="openNoteEditor('${key}')"
        >${noteText ? "✎ edit note" : "+ add note"}</button>
        <div id="editor-${key}" class="note-editor" style="display:none">
          <textarea placeholder="Notes, key concepts, questions…"></textarea>
          <div class="note-actions">
            <button class="btn-save"   onclick="saveNote('${key}')">Save</button>
            <button class="btn-cancel" onclick="closeNoteEditor('${key}')">Cancel</button>
          </div>
        </div>
      </div>
    </div>`;
}

function renderDay(d) {
  const isToday = d.day === todayDay;
  const isPast  = d.day < todayDay;
  let cardClass = "day-card";
  if (isToday) cardClass += " is-today";
  if (isPast)  cardClass += " is-past";

  let headClass  = "day-head";
  let badgeClass = "";
  if (d.review) { headClass += " review-head"; badgeClass = "review-badge"; }
  if (d.final)  { headClass += " final-head";  badgeClass = "final-badge"; }

  const todayChip = isToday ? `<span class="today-chip">TODAY</span>` : "";
  const finalChip = d.final ? `<span class="final-chip">FINAL DAY ✦</span>` : "";

  let bodyHtml;
  if (d.review) {
    const key = "rev-" + d.day;
    bodyHtml = renderTopicRow(key, "review-c", d.review);
  } else {
    const rKey = "r-" + d.day;
    const eKey = "e-" + d.day;
    bodyHtml = `
      ${renderTopicRow(rKey, "reading", d.r)}
      <div class="topic-divider"></div>
      ${renderTopicRow(eKey, "english", d.e)}`;
  }

  return `
    <div class="${cardClass}">
      <div class="${headClass}">
        <div class="day-head-left">
          <span class="day-num-badge ${badgeClass}">DAY ${d.day}</span>
          <span class="day-date-str">${d.date}</span>
        </div>
        ${todayChip}${finalChip}
      </div>
      <div class="day-body">${bodyHtml}</div>
    </div>`;
}

function renderWeek(week) {
  const daysHtml = week.days.map(renderDay).join("");
  return `
    <section class="week-section">
      <div class="week-divider">
        <div class="week-divider-line"></div>
        <span class="week-divider-label">${week.weekLabel}</span>
        <div class="week-divider-line"></div>
      </div>
      ${daysHtml}
    </section>`;
}

// ── BOOT ──────────────────────────────────────────────────────────────────────
document.getElementById("schedule-root").innerHTML =
  SCHEDULE.map(renderWeek).join("");
refreshProgress();
</script>
</body>
</html>
